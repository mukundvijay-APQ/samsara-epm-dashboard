    const pieColors = ["#1a56db", "#6c47a0", "#0d7a3e", "#c4760b", "#0c7792", "#d46212"];

    function Dashboard() {
      const [tab, setTab] = useState("overview");
      const [sel, setSel] = useState("CM35");
      const [rf, setRf] = useState("All");

      const tabs = [
        { id: "overview", l: "Program Overview" }, { id: "schedule", l: "Schedule & Components" },
        { id: "bom", l: "BOM & Cost" }, { id: "risks", l: "Risk Register" },
        { id: "xfunc", l: "Cross-Functional" }, { id: "suppliers", l: "Supplier Scorecard" },
      ];

      const pg = programs.find(p => p.id === sel) || programs[0];
      const fRisks = rf === "All" ? risks : risks.filter(r => r.pg === rf);
      const totBom = pg.bom.reduce((s, b) => s + b.q * b.u, 0);
      const gap = pg.cur - pg.tgt;

      const bomCats = (() => {
        const cats = {};
        pg.bom.forEach(b => {
          const t = b.q * b.u;
          const cat = b.c.includes("PCBA") ? "PCBA" : b.c.includes("Modem") || b.c.includes("SoC") || b.c.includes("Processor") ? "Silicon" : b.c.includes("Sensor") || b.c.includes("Camera") || b.c.includes("Lens") || b.c.includes("Module") || b.c.includes("IMU") || b.c.includes("Switch") || b.c.includes("Antenna") || b.c.includes("Accel") ? "Sensors/Modules" : b.c.includes("Enclosure") || b.c.includes("Thermal") || b.c.includes("Mount") || b.c.includes("Bracket") || b.c.includes("LED") ? "Mechanical" : b.c.includes("Package") || b.c.includes("Doc") || b.c.includes("Label") || b.c.includes("ESD") ? "Packaging" : b.c.includes("Battery") ? "Battery" : "Other";
          cats[cat] = (cats[cat] || 0) + t;
        });
        return Object.entries(cats).map(([name, value]) => ({ name, value: +value.toFixed(2) }));
      })();

      const costTrend = [
        { w: "W1", target: pg.tgt, actual: pg.cur + 12 }, { w: "W4", target: pg.tgt, actual: pg.cur + 9 },
        { w: "W8", target: pg.tgt, actual: pg.cur + 6 }, { w: "W12", target: pg.tgt, actual: pg.cur + 3 },
        { w: "W16", target: pg.tgt, actual: pg.cur + 1 }, { w: "W20", target: pg.tgt, actual: pg.cur },
        { w: "W24", target: pg.tgt, actual: pg.tgt + 2 },
      ];

      return (
        <div style={{ fontFamily: "'Inter', -apple-system, sans-serif", background: C.bg, color: C.txt, minHeight: "100vh" }}>
          <div style={{ background: "#ffffff", borderBottom: `1px solid ${C.bdr}`, padding: "20px 24px", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
                  <span style={{ fontSize: 20, fontWeight: 700, color: "#1a1f36" }}>Samsara</span>
                  <span style={{ width: 1, height: 20, background: C.bdr, display: "inline-block" }} />
                  <span style={{ fontSize: 13, color: C.a, fontWeight: 600 }}>Systems EPM Platform</span>
                </div>
                <div style={{ fontSize: 12, color: C.mut }}>Hardware Engineering Program Management Dashboard</div>
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {programs.map(p => (
                  <button key={p.id} onClick={() => setSel(p.id)} style={{
                    padding: "6px 14px", borderRadius: 8, border: `1px solid ${sel === p.id ? C.a : C.bdr}`,
                    background: sel === p.id ? C.a + "12" : "#ffffff", color: sel === p.id ? C.a : C.mut,
                    cursor: "pointer", fontSize: 12, fontWeight: 500,
                  }}>{p.id}</button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ background: "#ffffff", borderBottom: `1px solid ${C.bdr}`, overflowX: "auto" }}>
            <div style={{ display: "flex" }}>
              {tabs.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  padding: "10px 20px", border: "none", borderBottom: tab === t.id ? `2px solid ${C.a}` : "2px solid transparent",
                  background: "transparent", color: tab === t.id ? C.a : C.mut, fontSize: 13,
                  fontWeight: tab === t.id ? 600 : 400, cursor: "pointer", whiteSpace: "nowrap",
                }}>{t.l}</button>
              ))}
            </div>
          </div>

          <div style={{ padding: "24px 24px", maxWidth: 1400, margin: "0 auto" }}>

            {tab === "overview" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  <MC label="Active Programs" value={programs.length} sub="Across 4 product lines" />
                  <MC label="On Track" value={programs.filter(p => p.status === "On Track").length} sub={`of ${programs.length} programs`} color={C.ok} />
                  <MC label="Open Risks" value={risks.filter(r => r.st === "Open").length} sub={`${risks.filter(r => r.sev === "Critical" || r.sev === "High").length} high/critical`} color={C.warn} />
                  <MC label="Next Milestone" value="AT12 PVT" sub="PVT exit review â May 2026" color={C.pur} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
                  {programs.map(p => (
                    <Card key={p.id} style={{ cursor: "pointer", border: `1px solid ${sel === p.id ? C.a : C.bdr}` }}>
                      <div onClick={() => setSel(p.id)}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                          <div>
                            <div style={{ fontSize: 16, fontWeight: 600 }}>{p.id}</div>
                            <div style={{ fontSize: 12, color: C.mut }}>{p.name}</div>
                          </div>
                          <B color={sC[p.status]}>{p.status}</B>
                        </div>
                        <div style={{ fontSize: 11, color: C.dim, marginBottom: 10 }}>{p.desc}</div>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                          <span style={{ fontSize: 11, color: C.mut }}>Phase: <strong style={{ color: pC[p.phase] }}>{p.phase}</strong></span>
                          <span style={{ fontSize: 11, color: C.mut }}>{p.prog}%</span>
                        </div>
                        <PB val={p.prog} color={pC[p.phase]} />
                        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 11, color: C.dim }}>
                          <span>EPM: {p.owner}</span><span>MP: {p.mp}</span>
                        </div>
                        <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                          <B color={C.info}>{p.comps.length} components</B>
                          <B color={C.pur}>${p.cur.toFixed(2)} BOM</B>
                          <B color={C.dim}>{(p.vol / 1000).toFixed(0)}K vol</B>
                        </div>
                      </div>
                    </Card>
                  ))}
                </div>
                <Card title="Portfolio Timeline â All Programs">
                  {programs.map(p => (
                    <div key={p.id} style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>{p.id} â {p.name}</div>
                      <Gantt sched={p.sched} />
                    </div>
                  ))}
                </Card>
              </div>
            )}

            {tab === "schedule" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <Card title={`${pg.id} â ${pg.name} Schedule`} right={<B color={pC[pg.phase]}>{pg.phase}</B>}>
                  <Gantt sched={pg.sched} />
                </Card>
                <Card title="Component Breakdown by Subsystem">
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                      <thead>
                        <tr style={{ borderBottom: `1px solid ${C.bdr}` }}>
                          {["Component", "Subsystem", "Supplier", "Status", "Risk", "Lead"].map(h => (
                            <th key={h} style={{ padding: "10px 12px", textAlign: "left", color: C.mut, fontWeight: 500, fontSize: 11, textTransform: "uppercase" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {pg.comps.map((c, i) => (
                          <tr key={i} style={{ borderBottom: `1px solid ${C.bdr}88` }}>
                            <td style={{ padding: "10px 12px", fontWeight: 500, color: C.txt }}>{c.n}</td>
                            <td style={{ padding: "10px 12px" }}><B color={subColor[c.sub] || C.dim}>{c.sub}</B></td>
                            <td style={{ padding: "10px 12px", color: C.mut }}>{c.sup}</td>
                            <td style={{ padding: "10px 12px" }}><B color={stColor[c.st] || C.dim}>{c.st}</B></td>
                            <td style={{ padding: "10px 12px" }}><SB sev={c.risk} /></td>
                            <td style={{ padding: "10px 12px", color: C.mut, textAlign: "center" }}>{c.wk}w</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </Card>
              </div>
            )}

            {tab === "bom" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  <MC label="Current BOM" value={`$${pg.cur.toFixed(2)}`} sub={`Target: $${pg.tgt.toFixed(2)}`} color={gap > 0 ? C.warn : C.ok} />
                  <MC label="Cost Gap" value={`${gap > 0 ? "+" : ""}$${gap.toFixed(2)}`} sub={gap > 0 ? "Over target" : "Under target"} color={gap > 0 ? C.err : C.ok} />
                  <MC label="Annual Volume" value={`${(pg.vol / 1000).toFixed(0)}K`} sub="units/year" />
                  <MC label="Annual COGS" value={`$${((pg.cur * pg.vol) / 1e6).toFixed(1)}M`} sub="at current BOM" color={C.pur} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <Card title="Bill of Materials">
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                      <thead>
                        <tr style={{ borderBottom: `1px solid ${C.bdr}` }}>
                          {["Component", "Qty", "Unit $", "Ext $", "% BOM"].map(h => (
                            <th key={h} style={{ padding: "8px 8px", textAlign: h === "Component" ? "left" : "right", color: C.mut, fontWeight: 500, fontSize: 11 }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {[...pg.bom].sort((a, b) => b.q * b.u - a.q * a.u).map((b, i) => {
                          const ext = b.q * b.u;
                          return (
                            <tr key={i} style={{ borderBottom: `1px solid ${C.bdr}88` }}>
                              <td style={{ padding: "8px 8px", color: C.txt }}>{b.c}</td>
                              <td style={{ padding: "8px 8px", textAlign: "right", color: C.mut }}>{b.q}</td>
                              <td style={{ padding: "8px 8px", textAlign: "right", color: C.mut }}>${b.u.toFixed(2)}</td>
                              <td style={{ padding: "8px 8px", textAlign: "right", fontWeight: 500 }}>${ext.toFixed(2)}</td>
                              <td style={{ padding: "8px 8px", textAlign: "right", fontSize: 10, color: C.dim }}>{((ext / totBom) * 100).toFixed(1)}%</td>
                            </tr>
                          );
                        })}
                        <tr style={{ borderTop: `2px solid ${C.bdr}` }}>
                          <td style={{ padding: "10px 8px", fontWeight: 700 }}>TOTAL</td>
                          <td colSpan={2} />
                          <td style={{ padding: "10px 8px", textAlign: "right", fontWeight: 700, color: C.a, fontSize: 14 }}>${totBom.toFixed(2)}</td>
                          <td style={{ padding: "10px 8px", textAlign: "right", fontWeight: 700, color: C.mut }}>100%</td>
                        </tr>
                      </tbody>
                    </table>
                  </Card>
                  <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                    <Card title="Cost Breakdown">
                      <ResponsiveContainer width="100%" height={200}>
                        <PieChart>
                          <Pie data={bomCats} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={75} innerRadius={40} paddingAngle={3} label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`} style={{ fontSize: 10 }}>
                            {bomCats.map((_, i) => <Cell key={i} fill={pieColors[i % pieColors.length]} />)}
                          </Pie>
                          <Tooltip formatter={v => `$${v.toFixed(2)}`} contentStyle={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 8, fontSize: 12 }} />
                        </PieChart>
                      </ResponsiveContainer>
                    </Card>
                    <Card title="Cost Reduction Trend">
                      <ResponsiveContainer width="100%" height={180}>
                        <LineChart data={costTrend}>
                          <CartesianGrid strokeDasharray="3 3" stroke={C.bdr} />
                          <XAxis dataKey="w" tick={{ fontSize: 10, fill: C.dim }} />
                          <YAxis tick={{ fontSize: 10, fill: C.dim }} domain={["auto", "auto"]} />
                          <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 8, fontSize: 12 }} />
                          <Line type="monotone" dataKey="actual" stroke={C.a} strokeWidth={2} dot={{ r: 3 }} name="Actual" />
                          <Line type="monotone" dataKey="target" stroke={C.ok} strokeWidth={2} strokeDasharray="5 5" dot={false} name="Target" />
                          <Legend wrapperStyle={{ fontSize: 11 }} />
                        </LineChart>
                      </ResponsiveContainer>
                    </Card>
                  </div>
                </div>
              </div>
            )}

            {tab === "risks" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  <MC label="Total Risks" value={risks.length} />
                  <MC label="Critical/High" value={risks.filter(r => r.sev === "Critical" || r.sev === "High").length} color={C.err} />
                  <MC label="Open" value={risks.filter(r => r.st === "Open").length} color={C.warn} />
                  <MC label="Monitoring" value={risks.filter(r => r.st === "Monitoring").length} color={C.info} />
                </div>
                <Card title="Risk Register" right={
                  <div style={{ display: "flex", gap: 6 }}>
                    {["All", ...programs.map(p => p.id)].map(f => (
                      <button key={f} onClick={() => setRf(f)} style={{
                        padding: "4px 12px", borderRadius: 6, border: `1px solid ${rf === f ? C.a : C.bdr}`,
                        background: rf === f ? C.a + "12" : "transparent", color: rf === f ? C.a : C.mut,
                        cursor: "pointer", fontSize: 11,
                      }}>{f}</button>
                    ))}
                  </div>
                }>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ borderBottom: `1px solid ${C.bdr}` }}>
                        {["ID", "Prog", "Risk", "Sev.", "Likeli.", "Impact", "Owner", "Status"].map(h => (
                          <th key={h} style={{ padding: "8px 8px", textAlign: "left", color: C.mut, fontWeight: 500, fontSize: 11 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {fRisks.map(r => (
                        <tr key={r.id} style={{ borderBottom: `1px solid ${C.bdr}88` }}>
                          <td style={{ padding: "8px 8px", fontFamily: "monospace", color: C.dim, fontSize: 11 }}>{r.id}</td>
                          <td style={{ padding: "8px 8px" }}><B color={C.a}>{r.pg}</B></td>
                          <td style={{ padding: "8px 8px", color: C.txt, maxWidth: 260 }}>
                            <div>{r.t}</div>
                            <div style={{ fontSize: 10, color: C.dim, marginTop: 3 }}>Mitigation: {r.mit}</div>
                          </td>
                          <td style={{ padding: "8px 8px" }}><SB sev={r.sev} /></td>
                          <td style={{ padding: "8px 8px", color: C.mut }}>{r.lik}</td>
                          <td style={{ padding: "8px 8px", color: C.mut }}>{r.imp}</td>
                          <td style={{ padding: "8px 8px", color: C.mut, fontSize: 11 }}>{r.own}</td>
                          <td style={{ padding: "8px 8px" }}><B color={r.st === "Open" ? C.warn : C.info}>{r.st}</B></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </Card>
              </div>
            )}

            {tab === "xfunc" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <Card title="Cross-Functional Status Matrix" right={<span style={{ fontSize: 11, color: C.dim }}>Mar 11, 2026</span>}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ borderBottom: `1px solid ${C.bdr}` }}>
                        <th style={{ padding: "10px 12px", textAlign: "left", color: C.mut, fontWeight: 500, fontSize: 11 }}>Team</th>
                        {programs.map(p => (
                          <th key={p.id} style={{ padding: "10px 12px", textAlign: "center", color: C.mut, fontWeight: 500, fontSize: 11 }}>
                            {p.id}<br /><span style={{ fontSize: 10, color: C.dim }}>{p.phase}</span>
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {xFunc.map((row, i) => (
                        <tr key={i} style={{ borderBottom: `1px solid ${C.bdr}88` }}>
                          <td style={{ padding: "10px 12px", fontWeight: 500 }}>{row.team}</td>
                          {programs.map(p => (
                            <td key={p.id} style={{ padding: "10px 12px", textAlign: "center" }}>
                              <SD s={row[p.id]} />
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </Card>
                <Card title="Team Workload">
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={xFunc.map(r => ({
                      team: r.team.replace(" Eng.", "").replace(" / ", "/"),
                      "On Track": programs.filter(p => r[p.id] === "On Track").length,
                      "At Risk": programs.filter(p => r[p.id] === "At Risk").length,
                      "Not Started": programs.filter(p => r[p.id] === "Not Started").length,
                    }))}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.bdr} />
                      <XAxis dataKey="team" tick={{ fontSize: 9, fill: C.dim }} interval={0} angle={-20} textAnchor="end" height={60} />
                      <YAxis tick={{ fontSize: 10, fill: C.dim }} />
                      <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 8, fontSize: 12 }} />
                      <Bar dataKey="On Track" fill={C.ok} stackId="a" />
                      <Bar dataKey="At Risk" fill={C.warn} stackId="a" />
                      <Bar dataKey="Not Started" fill={C.dim} stackId="a" radius={[4, 4, 0, 0]} />
                      <Legend wrapperStyle={{ fontSize: 11 }} />
                    </BarChart>
                  </ResponsiveContainer>
                </Card>
              </div>
            )}

            {tab === "suppliers" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <Card title="Supplier / Partner Scorecard">
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ borderBottom: `1px solid ${C.bdr}` }}>
                        {["Supplier", "Type", "Programs", "Quality", "OTD", "Lead", "Location", "Risk"].map(h => (
                          <th key={h} style={{ padding: "10px 12px", textAlign: "left", color: C.mut, fontWeight: 500, fontSize: 11 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {suppliers.map((s, i) => (
                        <tr key={i} style={{ borderBottom: `1px solid ${C.bdr}88` }}>
                          <td style={{ padding: "10px 12px", fontWeight: 600 }}>{s.name}</td>
                          <td style={{ padding: "10px 12px" }}><B color={s.type === "CM" ? C.a : s.type === "ODM" ? C.pur : C.info}>{s.type}</B></td>
                          <td style={{ padding: "10px 12px", color: C.mut, fontSize: 11 }}>{s.prods}</td>
                          <td style={{ padding: "10px 12px" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <PB val={s.qual} color={s.qual >= 95 ? C.ok : C.warn} h={4} />
                              <span style={{ fontSize: 11, color: s.qual >= 95 ? C.ok : C.warn, fontWeight: 600, minWidth: 30 }}>{s.qual}%</span>
                            </div>
                          </td>
                          <td style={{ padding: "10px 12px" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <PB val={s.otd} color={s.otd >= 93 ? C.ok : C.warn} h={4} />
                              <span style={{ fontSize: 11, color: s.otd >= 93 ? C.ok : C.warn, fontWeight: 600, minWidth: 30 }}>{s.otd}%</span>
                            </div>
                          </td>
                          <td style={{ padding: "10px 12px", color: C.mut, textAlign: "center" }}>{s.lead}w</td>
                          <td style={{ padding: "10px 12px", color: C.dim, fontSize: 11 }}>{s.loc}</td>
                          <td style={{ padding: "10px 12px" }}><SB sev={s.risk} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </Card>
                <Card title="Quality vs On-Time Delivery">
                  <ResponsiveContainer width="100%" height={260}>
                    <BarChart data={suppliers} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke={C.bdr} />
                      <XAxis type="number" domain={[75, 100]} tick={{ fontSize: 10, fill: C.dim }} />
                      <YAxis type="category" dataKey="name" tick={{ fontSize: 11, fill: C.mut }} width={90} />
                      <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 8, fontSize: 12 }} />
                      <Bar dataKey="qual" fill={C.a} name="Quality %" radius={[0, 4, 4, 0]} barSize={10} />
                      <Bar dataKey="otd" fill={C.ok} name="OTD %" radius={[0, 4, 4, 0]} barSize={10} />
                      <Legend wrapperStyle={{ fontSize: 11 }} />
                    </BarChart>
                  </ResponsiveContainer>
                </Card>
              </div>
            )}
          </div>

          <div style={{ borderTop: `1px solid ${C.bdr}`, padding: "16px 24px", textAlign: "center", fontSize: 11, color: C.dim, marginTop: 40 }}>
            Samsara Systems EPM Platform â Concept by Mukund Vijay | Hardware program management for IoT product portfolios
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
